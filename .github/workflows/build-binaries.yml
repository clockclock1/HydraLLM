name: Build Executables

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            target: node24-win-x64
            artifact: hydrallm-windows-amd64.exe
          - name: windows-arm64
            os: windows-latest
            target: node24-win-arm64
            artifact: hydrallm-windows-arm64.exe
          - name: linux-amd64
            os: ubuntu-latest
            target: node24-linux-x64
            artifact: hydrallm-linux-amd64
          - name: linux-arm64
            os: ubuntu-latest
            target: node24-linux-arm64
            artifact: hydrallm-linux-arm64
          - name: macos-amd64
            os: macos-latest
            target: node24-macos-x64
            artifact: hydrallm-macos-amd64
          - name: macos-arm64
            os: macos-latest
            target: node24-macos-arm64
            artifact: hydrallm-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Build UI
        run: npm run build:ui

      - name: Build executable
        shell: bash
        run: |
          mkdir -p dist
          npx pkg . --targets "${{ matrix.target }}" --output "dist/${{ matrix.artifact }}" --no-bytecode --public

      - name: Smoke test server syntax
        run: node --check server.js

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

      - name: Attach executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/${{ matrix.artifact }}
