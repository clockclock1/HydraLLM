name: Build Executables

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: failover-proxy-windows-amd64.exe
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: failover-proxy-windows-arm64.exe
          - name: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: failover-proxy-linux-amd64
          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: failover-proxy-linux-arm64
          - name: macos-amd64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: failover-proxy-macos-amd64
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: failover-proxy-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build UI
        shell: bash
        run: |
          npm ci
          npm --prefix ui ci
          npm run build:ui

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux arm64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build executable
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --locked --target "${{ matrix.target }}"
          binary="target/${{ matrix.target }}/release/failover-proxy"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            binary="${binary}.exe"
          fi
          cp "$binary" "dist/${{ matrix.artifact }}"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

      - name: Attach executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/${{ matrix.artifact }}
