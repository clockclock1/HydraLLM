services:
  hydrallm:
    image: ${HYDRALLM_IMAGE:-ghcr.io/clockclock1/hydrallm}:${HYDRALLM_VERSION:-latest}
    container_name: hydrallm
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATA_DIR: /app/data
      RUST_LOG: ${RUST_LOG:-hydrallm=info,tower_http=info}
    ports:
      - "${HYDRALLM_PORT:-8787}:8787"
    volumes:
      - ${HYDRALLM_DATA_DIR:-./data}:/app/data
    networks:
      - hydrallm-network
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://127.0.0.1:8787/api/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  hydrallm-network:
    name: ${HYDRALLM_NETWORK:-hydrallm-network}
    driver: bridge
