services:
  failover-proxy:
    image: ${FAILOVER_PROXY_IMAGE:-ghcr.io/clockclock1/failover-proxy}:${FAILOVER_PROXY_VERSION:-latest}
    container_name: failover-proxy
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATA_DIR: /app/data
      RUST_LOG: ${RUST_LOG:-failover_proxy=info,tower_http=info}
    ports:
      - "${FAILOVER_PROXY_PORT:-8787}:8787"
    volumes:
      - ${FAILOVER_PROXY_DATA_DIR:-./data}:/app/data
    networks:
      - failover-proxy-network
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://127.0.0.1:8787/api/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  failover-proxy-network:
    name: ${FAILOVER_PROXY_NETWORK:-failover-proxy-network}
    driver: bridge
