apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydrallm
  namespace: hydrallm
  labels:
    app.kubernetes.io/name: hydrallm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hydrallm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hydrallm
    spec:
      containers:
        - name: hydrallm
          image: ghcr.io/clockclock1/hydrallm:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8787"
            - name: DATA_DIR
              value: /app/data
          ports:
            - name: http
              containerPort: 8787
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hydrallm-data
