apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydrallm
  namespace: hydrallm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hydrallm
  template:
    metadata:
      labels:
        app: hydrallm
    spec:
      containers:
        - name: hydrallm
          image: ghcr.io/clockclock1/hydrallm:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8787
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "8787"
            - name: DATA_DIR
              value: /app/data
            - name: RUST_LOG
              value: hydrallm=info,tower_http=info
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hydrallm-data
