apiVersion: apps/v1
kind: Deployment
metadata:
  name: failover-proxy
  namespace: failover-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: failover-proxy
  template:
    metadata:
      labels:
        app: failover-proxy
    spec:
      containers:
        - name: failover-proxy
          image: ghcr.io/clockclock1/failover-proxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8787
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "8787"
            - name: DATA_DIR
              value: /app/data
            - name: RUST_LOG
              value: failover_proxy=info,tower_http=info
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: failover-proxy-data
